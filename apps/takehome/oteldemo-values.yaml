### for now, production is identical to staging
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-telemetry
  namespace: open-telemetry
spec:
  values:

    # point the services to Alloy as their OTel Collector
    default:
      envOverrides:
        - name: OTEL_COLLECTOR_NAME
          value: k8s-monitoring-alloy-receiver.collector

    # turn off the included olly stack
    opentelemetry-collector:
      enabled: false

    jaeger:
      enabled: false

    prometheus:
      enabled: false

    grafana:
      enabled: false

    opensearch:
      enabled: false

    # these are already in place in this exercise, so don't deploy them again
    components:
      frontend:
        enabled: false
      frontendProxy:
        enabled: false
      kafka:
        enabled: false

    # in other cases, we did this:
    # uncommment 4 lines below to expose the frontend proxy with an external IP address (tested only on GKE)
    # in the "takehome" cluster, frontendProxy is being managed directly via K8s manifest,
    # and the LB is already configured there. So don't do it again here.
    # components:
    #   frontendProxy:
    #     service:
    #       type: LoadBalancer