# K8s integration
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-k8s-integration
  namespace: flux-system
spec:
  interval: 1h
  dependsOn:
    - name: infra-otel-frontend
  retryInterval: 5m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/collector-k8s-integration
  prune: true
  wait: true