### for now, production is identical to staging
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-telemetry
  namespace: open-telemetry
spec:
  values:

    # point the services to Alloy as their OTel Collector
    default:
      envOverrides:
        - name: OTEL_COLLECTOR_NAME
          value: k8s-monitoring-alloy-receiver.collector

      schedulingRules:
        nodeSelector:
          cloud.google.com/gke-nodepool: primary-nodes


    # turn off the included olly stack
    opentelemetry-collector:
      enabled: false

    jaeger:
      enabled: false

    prometheus:
      enabled: false

    grafana:
      enabled: false

    opensearch:
      enabled: false

    components:

      # uncommment 3 lines below to expose the frontend proxy with an external IP address (tested only on GKE)
      frontendProxy:
        service:
          type: LoadBalancer

      frontend:
        schedulingRules:
          nodeSelector:
            cloud.google.com/gke-nodepool: big-nodes