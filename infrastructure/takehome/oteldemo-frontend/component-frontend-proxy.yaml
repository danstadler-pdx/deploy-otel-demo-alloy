---
# Source: opentelemetry-demo/templates/component.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-frontendproxy
  labels:
    helm.sh/chart: opentelemetry-demo-0.33.8
    
    opentelemetry.io/name: otel-demo-frontendproxy
    app.kubernetes.io/instance: otel-demo
    app.kubernetes.io/component: frontendproxy
    app.kubernetes.io/name: otel-demo-frontendproxy
    app.kubernetes.io/version: "1.12.0"
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      
      opentelemetry.io/name: otel-demo-frontendproxy
  template:
    metadata:
      labels:
        
        opentelemetry.io/name: otel-demo-frontendproxy
        app.kubernetes.io/instance: otel-demo
        app.kubernetes.io/component: frontendproxy
        app.kubernetes.io/name: otel-demo-frontendproxy
    spec:
      serviceAccountName: otel-demo
      containers:
        - name: frontendproxy
          image: 'ghcr.io/open-telemetry/demo:1.12.0-frontendproxy'
          imagePullPolicy: IfNotPresent
          ports:
            
            - containerPort: 8080
              name: service
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            - name: OTEL_COLLECTOR_NAME
              value: alloy.collector
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: cumulative
            - name: ENVOY_PORT
              value: "8080"
            - name: FLAGD_HOST
              value: 'otel-demo-flagd'
            - name: FLAGD_PORT
              value: "8013"
            - name: FLAGD_UI_HOST
              value: 'otel-demo-flagd'
            - name: FLAGD_UI_PORT
              value: "4000"
            - name: FRONTEND_HOST
              value: 'otel-demo-frontend'
            - name: FRONTEND_PORT
              value: "8080"
            - name: GRAFANA_SERVICE_HOST
              value: 'otel-demo-grafana'
            - name: GRAFANA_SERVICE_PORT
              value: "80"
            - name: IMAGE_PROVIDER_HOST
              value: 'otel-demo-imageprovider'
            - name: IMAGE_PROVIDER_PORT
              value: "8081"
            - name: JAEGER_SERVICE_HOST
              value: 'otel-demo-jaeger-query'
            - name: JAEGER_SERVICE_PORT
              value: "16686"
            - name: LOCUST_WEB_HOST
              value: 'otel-demo-loadgenerator'
            - name: LOCUST_WEB_PORT
              value: "8089"
            - name: OTEL_COLLECTOR_HOST
              value: $(OTEL_COLLECTOR_NAME)
            - name: OTEL_COLLECTOR_PORT_GRPC
              value: "4317"
            - name: OTEL_COLLECTOR_PORT_HTTP
              value: "4318"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=1.12.0
          resources:
            requests:
              cpu: ".1"
              memory: 100Mi
            limits:
              cpu: ".2"
              memory: 300Mi
          securityContext:
            runAsGroup: 101
            runAsNonRoot: true
            runAsUser: 101
---
# Source: opentelemetry-demo/templates/component.yaml
apiVersion: v1
kind: Service
metadata:
  name: otel-demo-frontendproxy
  labels:
    helm.sh/chart: opentelemetry-demo-0.33.8
    
    opentelemetry.io/name: otel-demo-frontendproxy
    app.kubernetes.io/instance: otel-demo
    app.kubernetes.io/component: frontendproxy
    app.kubernetes.io/name: otel-demo-frontendproxy
    app.kubernetes.io/version: "1.12.0"
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      name: tcp-service
      targetPort: 8080
  selector:
    
    opentelemetry.io/name: otel-demo-frontendproxy